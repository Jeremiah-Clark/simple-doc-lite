# Simple Doc Lite v1.2.0 — Template Defaults
# ─────────────────────────────────────────────────────────────
# DO NOT EDIT THIS FILE.
# All per-project settings belong in project.yaml, which overrides
# these defaults at build time. Only fields with universally sensible
# defaults live here — anything requiring user input is in project.yaml.
# ─────────────────────────────────────────────────────────────
---
title: "Title"
author: "Author"
date: "Date"
version: ""
# keywords and subject flow into the PDF's metadata when set in project.yaml
subject: ""
lang: en-US

# Document layout
short-form: false
short-form-image-height: "2.2in"

# Template controls
toc: true
toc-depth: 2
secnumdepth: 2
figure-captions: true      # show image alt text as a caption under the image

# PDF settings
fontsize: 11pt
papersize: letter

# Page geometry
margin: "1in"
margin-top: "1.25in"
margin-bottom: "1.25in"
headheight: "14pt"
headsep: "12pt"
footskip: "30pt"
header-rule: "0.4pt"
footer-rule: "0.4pt"

# Title page spacing (long-form only)
logo-width: "0.8"
titlepage-post-rule: "2em"
titlepage-post-title: "0.75em"
titlepage-post-author: "0.5em"
titlepage-post-date: "3em"

# Fonts
font-body: "Noto Sans"
font-heading: "Noto Sans"
font-mono: "Noto Sans Mono"
linespread: "1.25"

# Colors
color-heading: "25,55,120"
color-link: "40,80,180"

# Callout colors — the sd-* names are tuned for readable white title
# text and clean pale backgrounds; plain LaTeX color names (red, blue,
# orange, ...) also work.
color-important: "sd-red"
color-note: "sd-blue"
color-warning: "sd-orange"
color-tip: "sd-green"
color-caution: "sd-amber"
color-summary: "sd-purple"
color-example: "sd-gray"
color-disclaimer: "sd-gray"   # title-page disclaimer box (long-form only)
---
