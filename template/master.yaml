# Simple Doc Lite v1.1.0 - Configuration
---
title: "Title"
author: "Author"
date: "Date"
version: ""
keywords:
  - keywords
subject: "A one-line document description."
lang: en-US

# ---------------------------------------------------------------------------
# Document layout
# ---------------------------------------------------------------------------
# Controls whether the cover info gets its own page or becomes a header
# block at the top of page 1.
#   false = Long-form. Full title page with centered logo and disclaimer.
#           Recommended for reports, manuals, specifications, or any
#           document longer than ~5 pages.
#   true  = Short-form. Compact header block at the top of page 1, with
#           the body flowing directly beneath. Disclaimer is omitted.
#           Recommended for memos, letters, briefs, cover notes
#           (typically 1–5 pages). Consider setting toc: false as well.
short-form: false

# Max height of the banner image in short-form. Ignored in long-form.
short-form-image-height: "2.2in"

# ---------------------------------------------------------------------------
# Logo / header image
# ---------------------------------------------------------------------------
# Recommended sizes (raster at 300 DPI for crisp print; vector preferred):
#
#   Long-form  — centered logo on the title page. Square or portrait
#                orientation works best.
#                  Target:   1500 × 1500 px  (≈ 5 × 5 in @ 300 DPI)
#                  Minimum:  1200 × 1200 px
#                  Format:   PNG w/ transparency, or SVG / PDF
#
#   Short-form — landscape banner spanning full text width. Short height
#                keeps the header block compact.
#                  Target:   2000 × 600 px   (≈ 6.5 × 2 in @ 300 DPI)
#                  Minimum:  1600 × 500 px
#                  Aspect:   ~3:1 to ~4:1 (wider than tall)
#                  Format:   PNG, JPG, SVG, or PDF
logo: images/logo.png

# Template controls
# Disclaimer text for the title page. Long-form only — ignored in short-form.
# Delete the entire line to hide the disclaimer box.
# disclaimer: "Confidential. Do not distribute."
toc: true                 # true/false
toc-depth: 2              # 1-6
secnumdepth: 2            # 0 = no numbers; 1 = H1 only; 2 = H1, and H2; 3 = H1, H2, and H3

# PDF settings
fontsize: 11pt
papersize: letter         # letter/a4

# ---------------------------------------------------------------------------
# Page layout
# ---------------------------------------------------------------------------
margin: "1in"             # Left and right margins
margin-top: "1.25in"      # Top margin
margin-bottom: "1.25in"   # Bottom margin

headheight: "14pt"        # Height of the header box
headsep: "12pt"           # Gap between the header rule and the body text
footskip: "30pt"          # Distance from the body bottom to the footer baseline

# Header/footer rule thickness (set to 0pt to hide a rule)
header-rule: "0.4pt"
footer-rule: "0.4pt"

# ---------------------------------------------------------------------------
# Title page (long-form only)
# ---------------------------------------------------------------------------
logo-width: "0.8"

titlepage-post-rule: "2em"      # After the top rule, before the title
titlepage-post-title: "0.75em"  # After the title, before the author
titlepage-post-author: "0.5em"  # After the author, before the date
titlepage-post-date: "3em"      # After the date, before the logo

# ---------------------------------------------------------------------------
# Style settings
# ---------------------------------------------------------------------------
# Fonts — use the full font family name as it appears on your system.
# Default: Noto Sans / Noto Sans Mono (free from Google Fonts, pre-installed
# on most Linux distributions). See the README for installation instructions.
font-body: "Noto Sans"
font-heading: "Noto Sans"
font-mono: "Noto Sans Mono"

# Line spacing (1.0 = single, 1.25 = default, 1.5 = one-and-a-half)
linespread: "1.25"

# Colors — RGB values as "R,G,B" (0–255)
color-heading: "25,55,120"
color-link: "40,80,180"

# Callout colors — LaTeX color names (red, blue, orange, green, etc.)
color-important: "red"
color-note: "blue"
color-warning: "orange"
color-tip: "green"
color-caution: "yellow"
color-summary: "violet"
color-example: "black"
---
